name: flower_joy
description: Цветочек Радости - медитативное приложение
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  audioplayers: ^6.0.0
  record: ^5.0.0
  permission_handler: ^11.3.0
  hive_flutter: ^1.1.0
  lottie: ^3.1.0
  path_provider: ^2.1.2
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/levels.json
    - assets/lottie/flower_pink.json
    - assets/lottie/flower_blue.json
    - assets/lottie/flower_green.json
    - assets/lottie/flower_sad.json
    - assets/lottie/flower_sleep.json
    - assets/lottie/flower_excited.json
    - assets/lottie/flower_nature.json
